name: rescue-robot-earthquake-v1
version: 0.1.0
description: |
  Autonomous search and rescue in earthquake disaster scenarios.
  Agents locate, triage, and rescue victims while managing power,
  sensing constraints, and environmental hazards.

author: Team Kaarigars
license: MIT
homepage: https://huggingface.co/spaces/your-org/rescue-robot-env

environment:
  class: rescue_env.core.environment.RescueEnvironment

observation_space:
  type: dict
  spaces:
    robot_status:
      type: dict
      spaces:
        position:
          type: box
          shape: [3]
          low: -100
          high: 100
        battery_level:
          type: box
          shape: [1]
          low: 0
          high: 100
        is_stable:
          type: discrete
          n: 2
    sensors:
      type: dict
      spaces:
        lidar_points:
          type: box
          shape: [null, 4]
          dtype: float32
        thermal_signatures:
          type: box
          shape: [null, 3]
          dtype: float32
        gas_levels:
          type: box
          shape: [5]
          low: 0
          high: 100

action_space:
  type: dict
  spaces:
    action_type:
      type: discrete
      n: 8
    parameters:
      type: box
      shape: [10]
      low: -100
      high: 100

reward_range: [0.0, 1.0]

tasks:
  - name: sweep_and_map
    difficulty: easy
    description: Complete area sweep in stable conditions.
    success_criteria:
      map_coverage: 0.95
      victims_detected: 0.90
      battery_remaining: 0.10

  - name: strategic_triage
    difficulty: medium
    description: Rescue prioritized victims in visibility-impaired conditions.
    success_criteria:
      critical_victims_rescued: 0.80
      priority_score: 0.75
      safety_score: 0.70

  - name: extreme_rescue
    difficulty: hard
    description: Mass casualty event under sensor degradation and high hazards.
    success_criteria:
      victims_rescued: 0.75
      decision_score: 0.75
      mission_completion: 0.85
      safety_score: 0.78

dependencies:
  - numpy>=1.24.0
  - pydantic>=2.6.0
  - PyYAML>=6.0.1
